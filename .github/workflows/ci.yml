name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      # The pixelize core is GPU-free; check it without the heavy generation backend.
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --no-default-features -- -D warnings
      - run: cargo test --workspace --no-default-features
      # The interactive gallery must also build + pass without the GPU/ML stack.
      - run: cargo clippy --no-default-features --features view --all-targets -- -D warnings
      - run: cargo test --no-default-features --features view
  gen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Verify the default install (generation backend) compiles cross-platform (CPU here).
      - run: cargo clippy -p flow-pixl --features gen --all-targets -- -D warnings
